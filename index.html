<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industrial Climate Alert Dashboard v4.0</title>
<style>
  body { font-family: Arial, sans-serif; background: #1e1e2f; color: #fff; margin: 0; padding: 15px; }
  h2 { color: #ffb347; text-align: center; margin: 0 0 15px; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; justify-content: center; }
  button, select { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
  button { background: #ffb347; color: #1e1e2f; }
  button:hover { background: #ffa500; }
  .btn-email { background: #00e5ff; color: #000; }
  .btn-delete { background: #ff4081; color: #fff; }
  .btn-save { background: #69f0ae; color: #000; }

  .thresholds { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; padding: 10px; background: #2a2a3f; border-radius: 8px; }
  .thresholds div { font-size: 14px; display: flex; flex-direction: column; align-items: center; }
  .thresholds input { width: 50px; background: #1e1e2f; color: #fff; border: 1px solid #ffb347; border-radius: 4px; padding: 4px; text-align: center; }

  .table-wrapper { overflow-x: auto; border: 1px solid #ffb347; border-radius: 8px; margin-bottom: 15px; }
  table { border-collapse: collapse; min-width: 800px; width: 100%; }
  th, td { border: 1px solid #444; padding: 8px; text-align: center; }
  th { background: #333; position: sticky; top: 0; z-index: 2; font-size: 12px; }
  .zone-label { background: #2a2a3f; font-weight: bold; position: sticky; left: 0; z-index: 1; min-width: 60px; }
  input[type=number] { width: 45px; background: #2a2a3f; color: #fff; border: 1px solid #555; border-radius: 4px; text-align: center; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 15px; }
  .stat-box { padding: 10px; background: #2a2a3f; border-radius: 8px; border: 1px solid #ffb347; }
  .stat-box h3 { color: #ffb347; margin: 0 0 5px; font-size: 14px; }
  .stat-box p { margin: 0; font-size: 13px; }

  .email-box { margin-top: 15px; padding: 15px; background: #2a2a3f; border-radius: 8px; border: 1px solid #ffb347; }
  .email-box input { width: 200px; padding: 8px; background: #1e1e2f; color: #fff; border: 1px solid #555; border-radius: 4px; }
  .email-list { margin-top: 10px; font-size: 13px; }
  .email-tag { background: #1e1e2f; padding: 4px 8px; border-radius: 4px; margin-right: 5px; display: inline-block; margin-top: 5px; }
  .email-tag span { cursor: pointer; color: #ff4081; margin-left: 5px; font-weight: bold; }

  .hot { background: #ff4444 !important; color: #fff; }
  .cold { background: #44aaff !important; color: #fff; }
  .alert-log { margin-top: 10px; max-height: 100px; overflow-y: auto; font-size: 12px; background: #111; padding: 5px; border-radius: 4px; color: #ffaa44; }
</style>
</head>
<body>

<h2 id="pageTitle">Industrial Climate Alert Dashboard v4.0</h2>

<div class="controls">
  <select id="langSelect" onchange="changeLang()">
    <option value="HU">🇭🇺 Magyar</option>
    <option value="EN">🇬🇧 English</option>
    <option value="DE">🇩🇪 Deutsch</option>
  </select>
  <button id="unitBtn" onclick="switchUnit()">°C</button>
  <button onclick="saveDay()" id="btnSave" class="btn-save">💾 Mentés</button>
  <button onclick="deleteToday()" id="btnDel" class="btn-delete">🗑️ Törlés</button>
  <button onclick="sendManualEmail()" id="btnEmail" class="btn-email">📧 EMAIL KÜLDÉS</button>
</div>

<div id="thresholds" class="thresholds"></div>

<div class="table-wrapper">
  <table>
    <thead><tr id="thead-row"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="stats">
  <div class="stat-box"><h3 id="stToday">Ma - Statisztika</h3><div id="todayStats"></div></div>
  <div class="stat-box"><h3 id="stWeek">Hét - Statisztika</h3><div id="weekStats"></div></div>
  <div class="stat-box"><h3 id="stMonth">Hónap - Statisztika</h3><div id="monthStats"></div></div>
  <div class="stat-box"><h3 id="stAlerts">Riasztások</h3><div id="alertLog" class="alert-log"></div></div>
</div>

<div class="email-box">
  <h3 id="emTitle" style="color:#ffb347; margin-top:0">E-mail Címek</h3>
  <input type="email" id="newEmail" placeholder="email@pelda.hu">
  <button onclick="addEmail()" style="padding: 8px 12px; font-size: 12px;">+ Hozzáadás</button>
  <div id="emailList" class="email-list"></div>
</div>

<script>
// --- NYELVI ADATOK ---
const dict = {
  HU: {
    title: "Industrial Climate Alert Dashboard v4.0",
    btnSave: "💾 Mentés",
    btnDel: "🗑️ Törlés",
    btnEmail: "📧 EMAIL KÜLDÉS",
    stToday: "Ma - Statisztika",
    stWeek: "Hét - Statisztika",
    stMonth: "Hónap - Statisztika",
    stAlerts: "Riasztások",
    emTitle: "E-mail Címek",
    zone: "Zóna",
    alertMin: "ALACSONY",
    alertMax: "MAGAS",
    noData: "Nincs adat",
    saved: "✓ Mentve!",
    deleted: "✓ Törölve!",
    mailSubject: "Klíma Riasztás - ",
    mailBody: "Hőségriadó érvényben! "
  },
  EN: {
    title: "Industrial Climate Alert Dashboard v4.0",
    btnSave: "💾 Save",
    btnDel: "🗑️ Delete",
    btnEmail: "📧 SEND EMAIL",
    stToday: "Today - Stats",
    stWeek: "Week - Stats",
    stMonth: "Month - Stats",
    stAlerts: "Alert Log",
    emTitle: "Email Addresses",
    zone: "Zone",
    alertMin: "LOW",
    alertMax: "HIGH",
    noData: "No Data",
    saved: "✓ Saved!",
    deleted: "✓ Deleted!",
    mailSubject: "Climate Alert - ",
    mailBody: "Heat alert in effect! "
  },
  DE: {
    title: "Industrial Climate Alert Dashboard v4.0",
    btnSave: "💾 Speichern",
    btnDel: "🗑️ Löschen",
    btnEmail: "📧 EMAIL SENDEN",
    stToday: "Heute - Statistik",
    stWeek: "Woche - Statistik",
    stMonth: "Monat - Statistik",
    stAlerts: "Alarm-Log",
    emTitle: "E-Mail-Adressen",
    zone: "Zone",
    alertMin: "NIEDRIG",
    alertMax: "HOCH",
    noData: "Keine Daten",
    saved: "✓ Gespeichert!",
    deleted: "✓ Gelöscht!",
    mailSubject: "Klima-Alarm - ",
    mailBody: "Hitzealarm in Kraft! "
  }
};

// --- VÁLTOZÓK ---
let lang = "HU";
let unit = "C";
let todayData = {};
let thresholds = {};
let emails = [];
const zones = 5;
const hours = 24;
const today = new Date().toISOString().split('T');

// --- INICIALIZÁLÁS ---
function init() {
  loadData();
  renderThresholds();
  renderHeader();
  renderTable();
  renderEmails();
  updateStats();
  changeLang(); // Nyelv beállítása
}

// --- NYELVVÁLTÁS ---
function changeLang() {
  lang = document.getElementById('langSelect').value;
  const t = dict[lang];

  document.getElementById('pageTitle').innerText = t.title;
  document.getElementById('btnSave').innerText = t.btnSave;
  document.getElementById('btnDel').innerText = t.btnDel;
  document.getElementById('btnEmail').innerText = t.btnEmail;
  document.getElementById('stToday').innerText = t.stToday;
  document.getElementById('stWeek').innerText = t.stWeek;
  document.getElementById('stMonth').innerText = t.stMonth;
  document.getElementById('stAlerts').innerText = t.stAlerts;
  document.getElementById('emTitle').innerText = t.emTitle;

  renderThresholds();
  renderHeader();
  renderTable();
  updateStats();
}

// --- KÜSZÖBÉRTÉKEK ---
function renderThresholds() {
  const t = dict[lang];
  let html = '';
  for(let z=1; z<=zones; z++) {
    if(!thresholds[z]) thresholds[z] = {min: 18, max: 26};
    html += `<div>
      <b>${t.zone} ${z}</b><br>
      Min: <input type="number" step="0.1" value="${thresholds[z].min}" onchange="setThreshold(${z},'min',this.value)">
      Max: <input type="number" step="0.1" value="${thresholds[z].max}" onchange="setThreshold(${z},'max',this.value)">
    </div>`;
  }
  document.getElementById('thresholds').innerHTML = html;
}

function setThreshold(z, type, val) {
  thresholds[z] [type] = parseFloat(val);
  localStorage.setItem('thresholds', JSON.stringify(thresholds));
  renderTable();
}

// --- TÁBLÁZAT ---
function renderHeader() {
  const t = dict[lang];
  const row = document.getElementById('thead-row');
  let html = `<th class="zone-label">${t.zone}</th>`;
  for(let i=0; i<hours; i++) html += `<th>${i}:00 ${unit}</th>`;
  row.innerHTML = html;
}

function renderTable() {
  const t = dict[lang];
  const tbody = document.getElementById('tbody');
  let html = '';
  
  for (let z = 1; z <= zones; z++) {
    html += `<tr><td class="zone-label">${t.zone} ${z}</td>`;
    for (let h = 0; h < hours; h++) {
      let val = todayData[z]?.[h] ?? '';
      let num = parseFloat(val);
      let min = thresholds[z]?.min ?? 18;
      let max = thresholds[z]?.max ?? 26;
      let cls = '';
      
      if (!isNaN(num)) {
        if (num > max) { cls = 'hot'; checkAlert(z, h, num, 'MAX'); }
        else if (num < min) { cls = 'cold'; checkAlert(z, h, num, 'MIN'); }
      }
      
      html += `<td><input type="number" step="0.1" value="${val}" onchange="saveCell(${z},${h},this.value)" class="${cls}"></td>`;
    }
    html += '</tr>';
  }
  tbody.innerHTML = html;
}

function saveCell(z, h, val) {
  if (!todayData[z]) todayData[z] = {};
  todayData[z] [h] = val;
  localStorage.setItem('today_' + today, JSON.stringify(todayData));
  renderTable();
  updateStats();
}

// --- MÉRTÉKEGYSÉG ---
function switchUnit() {
  const convert = unit === 'C' ? (c => c * 9/5 + 32) : (f => (f - 32) * 5/9);
  
  for(let z=1; z<=zones; z++) {
    for(let h=0; h<hours; h++) {
      if(todayData[z]?.[h]) {
        todayData[z] [h] = convert(parseFloat(todayData[z] [h])).toFixed(1);
      }
    }
    if(thresholds[z]) {
      thresholds[z].min = convert(thresholds[z].min).toFixed(1);
      thresholds[z].max = convert(thresholds[z].max).toFixed(1);
    }
  }
  
  unit = unit === 'C' ? 'F' : 'C';
  document.getElementById('unitBtn').innerText = unit;
  localStorage.setItem('today_' + today, JSON.stringify(todayData));
  localStorage.setItem('thresholds', JSON.stringify(thresholds));
  renderThresholds();
  renderHeader();
  renderTable();
}

// --- MENTÉS / TÖRLÉS ---
function saveDay() {
  let allDays = JSON.parse(localStorage.getItem('allDays') || '{}');
  allDays[today] = todayData;
  localStorage.setItem('allDays', JSON.stringify(allDays));
  alert(dict[lang].saved);
}

function deleteToday() {
  if(confirm('Biztosan törlöd a mai adatot?')) {
    todayData = {};
    localStorage.removeItem('today_' + today);
    renderTable();
    alert(dict[lang].deleted);
  }
}

// --- STATISZTIKA ---
function updateStats() {
  const t = dict[lang];
  
  // Mai stat
  let html = '';
  for(let z=1; z<=zones; z++) {
    let vals = Object.values(todayData[z]||{}).map(Number).filter(v=>!isNaN(v));
    if(vals.length) html += `<p><b>${t.zone} ${z}:</b> Max ${Math.max(...vals).toFixed(1)}° | Min ${Math.min(...vals).toFixed(1)}° | Átl ${(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1)}°</p>`;
    else html += `<p><b>${t.zone} ${z}:</b> ${t.noData}</p>`;
  }
  document.getElementById('todayStats').innerHTML = html;

  // Hét/Hónap stat
  let allDays = JSON.parse(localStorage.getItem('allDays') || '{}');
  let weekHtml = '', monthHtml = '';
  let weekDays = getLastNDays(7, allDays);
  let monthDays = getLastNDays(30, allDays);

  for(let z=1; z<=zones; z++) {
    let weekVals = getAllVals(z, weekDays);
    let monthVals = getAllVals(z, monthDays);
    weekHtml += weekVals.length? `<p><b>${t.zone} ${z}:</b> Max ${Math.max(...weekVals).toFixed(1)}° | Min ${Math.min(...weekVals).toFixed(1)}°</p>` : `<p><b>${t.zone} ${z}:</b> ${t.noData}</p>`;
    monthHtml += monthVals.length? `<p><b>${t.zone} ${z}:</b> Max ${Math.max(...monthVals).toFixed(1)}° | Min ${Math.min(...monthVals).toFixed(1)}°</p>` : `<p><b>${t.zone} ${z}:</b> ${t.noData}</p>`;
  }
  document.getElementById('weekStats').innerHTML = weekHtml;
  document.getElementById('monthStats').innerHTML = monthHtml;
}

function getLastNDays(n, allDays) {
  let days = Object.keys(allDays).reverse().slice(0, n);
  return days;
}

function getAllVals(z, days) {
  let allDays = JSON.parse(localStorage.getItem('allDays') || '{}');
  let vals = [];
  days.forEach(d => {
    if(allDays[d]?.[z]) {
      vals = vals.concat(Object.values(allDays[d] [z]).map(Number).filter(v=>!isNaN(v)));
    }
  });
  return vals;
}

// --- RIASZTÁSOK ---
let alertLog = [];
function checkAlert(z, h, val, type) {
  const t = dict[lang];
  let msg = `${t.zone} ${z} @ ${h}:00 - ${val}° (${type === 'MAX' ? t.alertMax : t.alertMin})`;
  if(!alertLog.includes(msg)) {
    alertLog.push(msg);
    localStorage.setItem('alertLog_' + today, JSON.stringify(alertLog));
  }
}

function updateAlerts() {
  const t = dict[lang];
  let log = JSON.parse(localStorage.getItem('alertLog_' + today) || '[]');
  
  // Ha van nap, de nincs log, nézzük át az aktuális adatokat
  if(log.length === 0 && Object.keys(todayData).length > 0) {
    for(let z=1; z<=zones; z++) {
      for(let h=0; h<hours; h++) {
        let val = todayData[z]?.[h];
        if(val) {
          let num = parseFloat(val);
          if(!isNaN(num)) {
             if(num > thresholds[z].max) log.push(`${t.zone} ${z} @ ${h}:00 - ${num}° (${t.alertMax})`);
             else if(num < thresholds[z].min) log.push(`${t.zone} ${z} @ ${h}:00 - ${num}° (${t.alertMin})`);
          }
        }
      }
    }
    localStorage.setItem('alertLog_' + today, JSON.stringify(log));
  }
  document.getElementById('alertLog').innerHTML = log.map(l => `<div>${l}</div>`).join('');
}

// --- EMAIL ---
function addEmail() {
  let input = document.getElementById('newEmail');
  let val = input.value.trim();
  if(val && !emails.includes(val)) {
    emails.push(val);
    localStorage.setItem('emails', JSON.stringify(emails));
    input.value = '';
    renderEmails();
  }
}

function renderEmails() {
  let html = '';
  emails.forEach(email => {
    html += `<div class="email-tag">${email} <span onclick="removeEmail('${email}')">X</span></div>`;
  });
  document.getElementById('emailList').innerHTML = html;
}

function removeEmail(email) {
  emails = emails.filter(e => e !== email);
  localStorage.setItem('emails', JSON.stringify(emails));
  renderEmails();
}

function sendManualEmail() {
  if(emails.length === 0) {
    alert("Nincs e-mail cím hozzáadva!");
    return;
  }
  
  // Adatok összeszámolása
  let summary = "";
  for(let z=1; z<=zones; z++) {
    let vals = Object.values(todayData[z]||{}).map(Number).filter(v=>!isNaN(v));
    if(vals.length) {
      summary += `Zóna ${z}: Max ${Math.max(...vals).toFixed(1)}°, Min ${Math.min(...vals).toFixed(1)}°, Átl: ${(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1)}°\n`;
    }
  }
  
  let subject = dict[lang].mailSubject + today;
  let body = dict[lang].mailBody + "\n\n" + summary;
  
  // Ha van log
  let log = JSON.parse(localStorage.getItem('alertLog_' + today) || '[]');
  if(log.length > 0) {
    body += "\n\nRiasztások:\n" + log.join("\n");
  }

  // Nyisd meg az e-mail klienst
  let mailtoLink = `mailto:${emails.join(',')}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailtoLink;
}

// --- ADATOK BETÖLTÉSE ---
function loadData() {
  todayData = JSON.parse(localStorage.getItem('today_' + today) || '{}');
  thresholds = JSON.parse(localStorage.getItem('thresholds') || '{}');
  emails = JSON.parse(localStorage.getItem('emails') || '[]');
  
  // Ha nincs thresholds, legyen alapértelmezett
  for(let z=1; z<=zones; z++) {
    if(!thresholds[z]) thresholds[z] = {min: 18, max: 26};
  }
}

// --- INDÍTÁS ---
window.onload = function() {
  init();
  updateAlerts();
};
</script>
</body>
</html>
