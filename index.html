<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Climate Dashboard v4.1</title>
<style>
  body { font-family: Arial, sans-serif; background: #1e1e2f; color: #fff; margin: 0; padding: 15px; }
  h2 { color: #ffb347; text-align: center; margin: 0 0 15px; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; justify-content: center; }
  button, select { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
  button { background: #ffb347; color: #1e1e2f; }
  button:hover { background: #ffa500; }
  .btn-email { background: #00e5ff; color: #000; }
  .btn-delete { background: #ff4081; color: #fff; }
  .btn-save { background: #69f0ae; color: #000; }
  .thresholds { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; padding: 10px; background: #2a2a3f; border-radius: 8px; }
  .thresholds div { font-size: 14px; display: flex; flex-direction: column; align-items: center; }
  .thresholds input { width: 50px; background: #1e1e2f; color: #fff; border: 1px solid #ffb347; border-radius: 4px; padding: 4px; text-align: center; }
  .table-wrapper { overflow-x: auto; border: 1px solid #ffb347; border-radius: 8px; margin-bottom: 15px; }
  table { border-collapse: collapse; min-width: 800px; width: 100%; }
  th, td { border: 1px solid #444; padding: 8px; text-align: center; }
  th { background: #333; position: sticky; top: 0; z-index: 2; font-size: 12px; }
  .zone-label { background: #2a2a3f; font-weight: bold; position: sticky; left: 0; z-index: 1; min-width: 60px; }
  input[type=number] { width: 45px; background: #2a2a3f; color: #fff; border: 1px solid #555; border-radius: 4px; text-align: center; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 15px; }
  .stat-box { padding: 10px; background: #2a2a3f; border-radius: 8px; border: 1px solid #ffb347; }
  .stat-box h3 { color: #ffb347; margin: 0 0 5px; font-size: 14px; }
  .stat-box p { margin: 0; font-size: 13px; }
  .email-box { margin-top: 15px; padding: 15px; background: #2a2a3f; border-radius: 8px; border: 1px solid #ffb347; }
  .email-box input { width: 200px; padding: 8px; background: #1e1e2f; color: #fff; border: 1px solid #555; border-radius: 4px; }
  .email-list { margin-top: 10px; font-size: 13px; }
  .email-tag { background: #1e1e2f; padding: 4px 8px; border-radius: 4px; margin-right: 5px; display: inline-block; margin-top: 5px; }
  .email-tag span { cursor: pointer; color: #ff4081; margin-left: 5px; font-weight: bold; }
  .hot { background: #ff4444 !important; color: #fff; }
  .cold { background: #44aaff !important; color: #fff; }
  .alert-log { margin-top: 10px; max-height: 100px; overflow-y: auto; font-size: 12px; background: #111; padding: 5px; border-radius: 4px; color: #ffaa44; }
</style>
</head>
<body>

<h2 id="pageTitle">Industrial Climate Alert Dashboard v4.0</h2>

<div class="controls">
  <select id="langSelect" onchange="changeLang()">
    <option value="HU">🇭🇺 Magyar</option>
    <option value="EN">🇬🇧 English</option>
    <option value="DE">🇩🇪 Deutsch</option>
  </select>
  <button id="unitBtn" onclick="switchUnit()">°C</button>
  <button onclick="saveDay()" id="btnSave" class="btn-save">💾 Mentés</button>
  <button onclick="deleteToday()" id="btnDel" class="btn-delete">🗑️ Törlés</button>
  <button onclick="sendManualEmail()" id="btnEmail" class="btn-email">📧 EMAIL KÜLDÉS</button>
</div>

<div id="thresholds" class="thresholds"></div>

<div class="table-wrapper">
  <table>
    <thead><tr id="thead-row"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="stats">
  <div class="stat-box">
    <h3 id="stToday">Ma - Statisztika</h3>
    <div id="todayStats"></div>
  </div>
  <div class="stat-box">
    <h3 id="stWeek">Hét - Statisztika</h3>
    <div id="weekStats"></div>
  </div>
  <div class="stat-box">
    <h3 id="stMonth">Hónap - Statisztika</h3>
    <div id="monthStats"></div>
  </div>
  <div class="stat-box">
    <h3 id="stAlerts">Riasztások</h3>
    <div id="alertLog" class="alert-log"></div>
  </div>
</div>

<div class="email-box">
  <h3 id="emTitle" style="color:#ffb347;margin-top:0">E-mail Címek</h3>
  <input type="email" id="newEmail" placeholder="email@pelda.hu">
  <button onclick="addEmail()" style="padding:8px 12px;font-size:12px">+ Hozzáadás</button>
  <div id="emailList" class="email-list"></div>
</div>

<script>
// --- KONFIGURÁCIÓ ÉS VÁLTOZÓK ---
const dict = {
  HU: {
    title: "Industrial Climate Alert Dashboard v4.0",
    btnSave: "💾 Mentés", btnDel: "🗑️ Törlés", btnEmail: "📧 EMAIL KÜLDÉS",
    stToday: "Ma - Statisztika", stWeek: "Hét - Statisztika", stMonth: "Hónap - Statisztika", stAlerts: "Riasztások",
    emTitle: "E-mail Címek", zone: "Zóna",
    alertMin: "ALACSONY", alertMax: "MAGAS",
    noData: "Nincs adat",
    saved: "✓ Mentve!", deleted: "✓ Törölve!",
    mailSubject: "Klíma Riasztás - ", mailBody: "Hőségriadó érvényben! \n\n"
  },
  EN: {
    title: "Industrial Climate Alert Dashboard v4.0",
    btnSave: "💾 Save", btnDel: "🗑️ Delete", btnEmail: "📧 SEND EMAIL",
    stToday: "Today - Stats", stWeek: "Week - Stats", stMonth: "Month - Stats", stAlerts: "Alert Log",
    emTitle: "Email Addresses", zone: "Zone",
    alertMin: "LOW", alertMax: "HIGH",
    noData: "No Data",
    saved: "✓ Saved!", deleted: "✓ Deleted!",
    mailSubject: "Climate Alert - ", mailBody: "Heat alert in effect! \n\n"
  },
  DE: {
    title: "Industrial Climate Alert Dashboard v4.0",
    btnSave: "💾 Speichern", btnDel: "🗑️ Löschen", btnEmail: "📧 EMAIL SENDEN",
    stToday: "Heute - Statistik", stWeek: "Woche - Statistik", stMonth: "Monat - Statistik", stAlerts: "Alarm-Log",
    emTitle: "E-Mail-Adressen", zone: "Zone",
    alertMin: "NIEDRIG", alertMax: "HOCH",
    noData: "Keine Daten",
    saved: "✓ Gespeichert!", deleted: "✓ Gelöscht!",
    mailSubject: "Klima-Alarm - ", mailBody: "Hitzealarm in Kraft! \n\n"
  }
};

let lang = "HU";
let unit = "C";
let todayData = {};
let thresholds = {};
let emails = [];
let alertLog = [];
const zones = 5;
const hours = 24;
const STORAGE_KEY = "climate_dashboard_data";
const ALL_DAYS_KEY = "climate_all_days";
const ALERT_LOG_KEY = "climate_alert_log_v3";
const EMAILS_KEY = "climate_emails";

// --- INDÍTÁS ---
function init() {
  loadData();
  renderThresholds();
  renderHeader();
  renderTable();
  renderEmails();
  updateStats();
  updateAlerts();
  changeLang();
}

// --- NYELV VÁLTÁS ---
function changeLang() {
  lang = document.getElementById("langSelect").value;
  const t = dict[lang];
  document.getElementById("pageTitle").innerText = t.title;
  document.getElementById("btnSave").innerText = t.btnSave;
  document.getElementById("btnDel").innerText = t.btnDel;
  document.getElementById("btnEmail").innerText = t.btnEmail;
  document.getElementById("stToday").innerText = t.stToday;
  document.getElementById("stWeek").innerText = t.stWeek;
  document.getElementById("stMonth").innerText = t.stMonth;
  document.getElementById("stAlerts").innerText = t.stAlerts;
  document.getElementById("emTitle").innerText = t.emTitle;
  
  renderThresholds();
  renderHeader();
  renderTable();
  updateStats();
  updateAlerts();
}

// --- HATÁRÉRTÉKEK ---
function renderThresholds() {
  const t = dict[lang];
  let html = "";
  for (let z = 1; z <= zones; z++) {
    if (!thresholds[z]) thresholds[z] = { min: 18, max: 26 };
    html += `<div><b>${t.zone} ${z}</b><br>`;
    html += `Min:<input type="number" step="0.1" value="${thresholds[z].min}" onchange="setThreshold(${z},'min',this.value)"> `;
    html += `Max:<input type="number" step="0.1" value="${thresholds[z].max}" onchange="setThreshold(${z},'max',this.value)"></div>`;
  }
  document.getElementById("thresholds").innerHTML = html;
}

function setThreshold(z, type, val) {
  thresholds[z] [type] = parseFloat(val);
  localStorage.setItem("thresholds", JSON.stringify(thresholds));
  renderTable();
}

// --- TÁBLA ÉS FEJLÉC ---
function renderHeader() {
  const t = dict[lang];
  const row = document.getElementById("thead-row");
  let html = `<th class="zone-label">${t.zone}</th>`;
  for (let i = 0; i < hours; i++) html += `<th>${i}:00 ${unit}</th>`;
  row.innerHTML = html;
}

function renderTable() {
  const t = dict[lang];
  const tbody = document.getElementById("tbody");
  let html = "";
  alertLog = []; // Töröljük a logot, mert újraellenőrizzük az aktuális értékeket
  
  for (let z = 1; z <= zones; z++) {
    html += `<tr><td class="zone-label">${t.zone} ${z}</td>`;
    for (let h = 0; h < hours; h++) {
      let val = todayData[z]?.[h] ?? "";
      let num = parseFloat(val);
      let min = thresholds[z]?.min ?? 18;
      let max = thresholds[z]?.max ?? 26;
      let cls = "";
      
      // Riasztás ellenőrzése
      if (!isNaN(num)) {
        if (num > max) {
          cls = "hot";
          checkAlert(z, h, num, "MAX");
        } else if (num < min) {
          cls = "cold";
          checkAlert(z, h, num, "MIN");
        }
      }
      
      html += `<td><input type="number" step="0.1" value="${val}" onchange="saveCell(${z},${h},this.value)" class="${cls}"></td>`;
    }
    html += "</tr>";
  }
  tbody.innerHTML = html;
}

function saveCell(z, h, val) {
  if (!todayData[z]) todayData[z] = {};
  todayData[z] [h] = val;
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ todayData: todayData }));
  renderTable();
  updateStats();
}

function checkAlert(z, h, val, type) {
  const t = dict[lang];
  const alertMsg = type === "MAX" ? t.alertMax : t.alertMin;
  const exists = alertLog.find(a => a.z === z && a.h === h && a.type === type);
  if (!exists) {
    alertLog.push({ z, h, val, type, alertMsg });
  }
}

// --- MÉRTÉKEGYSÉG ---
function switchUnit() {
  const convert = unit === "C" ? (c) => c * 9 / 5 + 32 : (f) => (f - 32) * 5 / 9;
  
  // Adatok konvertálása
  for (let z = 1; z <= zones; z++) {
    for (let h = 0; h < hours; h++) {
      if (todayData[z]?.[h]) {
        todayData[z] [h] = convert(parseFloat(todayData[z] [h])).toFixed(1);
      }
    }
    if (thresholds[z]) {
      thresholds[z].min = convert(thresholds[z].min).toFixed(1);
      thresholds[z].max = convert(thresholds[z].max).toFixed(1);
    }
  }
  
  unit = unit === "C" ? "F" : "C";
  document.getElementById("unitBtn").innerText = unit;
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ todayData: todayData }));
  localStorage.setItem("thresholds", JSON.stringify(thresholds));
  
  renderThresholds();
  renderHeader();
  renderTable();
}

// --- MENTÉS ÉS TÖRLÉS ---
function saveDay() {
  let allDays = JSON.parse(localStorage.getItem(ALL_DAYS_KEY) || "{}");
  let todayStr = new Date().toISOString().split("T"); // Helyes dátumképzés
  allDays[todayStr] = todayData;
  localStorage.setItem(ALL_DAYS_KEY, JSON.stringify(allDays));
  alert(dict[lang].saved);
}

function deleteToday() {
  if (confirm("Biztosan törlöd a mai adatot?")) {
    todayData = {};
    alertLog = [];
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(ALERT_LOG_KEY);
    renderTable();
    updateAlerts();
    updateStats();
    alert(dict[lang].deleted);
  }
}

// --- STATISZTIKÁK ---
function updateStats() {
  const t = dict[lang];
  
  // Ma
  let todayHtml = "";
  for (let z = 1; z <= zones; z++) {
    let vals = Object.values(todayData[z] || {}).map(Number).filter(v => !isNaN(v));
    if (vals.length) {
      todayHtml += `<p><b>${t.zone} ${z}:</b> Max ${Math.max(...vals).toFixed(1)}° | Min ${Math.min(...vals).toFixed(1)}°</p>`;
    } else {
      todayHtml += `<p><b>${t.zone} ${z}:</b> ${t.noData}</p>`;
    }
  }
  document.getElementById("todayStats").innerHTML = todayHtml;

  // Hét / Hónap
  let allDays = JSON.parse(localStorage.getItem(ALL_DAYS_KEY) || "{}");
  let today = new Date();
  let weekStart = new Date(today);
  weekStart.setDate(today.getDate() - today.getDay()); // Hét kezdete
  let monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  
  let allWeekData = [];
  let allMonthData = [];
  
  for (let d in allDays) {
    let date = new Date(d);
    if (date >= weekStart) {
      let dayData = allDays[d];
      for (let z = 1; z <= zones; z++) {
        if (dayData[z]) {
          let vals = Object.values(dayData[z]).map(Number).filter(v => !isNaN(v));
          if (vals.length) allWeekData.push(...vals);
        }
      }
    }
    if (date >= monthStart) {
      let dayData = allDays[d];
      for (let z = 1; z <= zones; z++) {
        if (dayData[z]) {
          let vals = Object.values(dayData[z]).map(Number).filter(v => !isNaN(v));
          if (vals.length) allMonthData.push(...vals);
        }
      }
    }
  }
  
  let weekHtml = "";
  if (allWeekData.length) {
    let maxW = Math.max(...allWeekData);
    let minW = Math.min(...allWeekData);
    let avgW = allWeekData.reduce((a, b) => a + b, 0) / allWeekData.length;
    weekHtml = `Max: ${maxW.toFixed(1)}° | Min: ${minW.toFixed(1)}° | Átlag: ${avgW.toFixed(1)}°`;
  } else weekHtml = t.noData;
  
  let monthHtml = "";
  if (allMonthData.length) {
    let maxM = Math.max(...allMonthData);
    let minM = Math.min(...allMonthData);
    let avgM = allMonthData.reduce((a, b) => a + b, 0) / allMonthData.length;
    monthHtml = `Max: ${maxM.toFixed(1)}° | Min: ${minM.toFixed(1)}° | Átlag: ${avgM.toFixed(1)}°`;
  } else monthHtml = t.noData;
  
  document.getElementById("weekStats").innerHTML = weekHtml;
  document.getElementById("monthStats").innerHTML = monthHtml;
}

// --- RIASZTÁSOK ---
function updateAlerts() {
  const t = dict[lang];
  let html = "";
  alertLog.forEach(a => {
    let type = a.type === "MAX" ? "MAGAS" : "ALACSONY";
    let color = a.type === "MAX" ? "#ff4444" : "#44aaff";
    html += `<div style="color:${color}">⚠️ Zóna ${a.z} (${a.h}:00) - ${a.val}° (${type})</div>`;
  });
  document.getElementById("alertLog").innerHTML = html || t.noData;
}

// --- EMAIL KEZELÉS ---
function addEmail() {
  let email = document.getElementById("newEmail").value.trim();
  if (email && !emails.includes(email)) {
    emails.push(email);
    localStorage.setItem(EMAILS_KEY, JSON.stringify(emails));
    renderEmails();
    document.getElementById("newEmail").value = "";
  }
}

function renderEmails() {
  let html = "";
  emails.forEach((e, i) => {
    html += `<span class="email-tag">${e} <span onclick="removeEmail(${i})">×</span></span>`;
  });
  document.getElementById("emailList").innerHTML = html;
}

function removeEmail(i) {
  emails.splice(i, 1);
  localStorage.setItem(EMAILS_KEY, JSON.stringify(emails));
  renderEmails();
}

function sendManualEmail() {
  const t = dict[lang];
  
  // 1. Ha nincs riasztás, hibaüzenet
  if (alertLog.length === 0) {
    alert("Nincs aktív riasztás a küldéshez!");
    return;
  }
  
  // 2. Ha nincs email cím, hibaüzenet
  if (emails.length === 0) {
    alert("Nincs megadva e-mail cím!");
    return;
  }
  
  // 3. Dátum hozzáadása az üzenethez (a mai dátummal)
  let todayStr = new Date().toISOString().split("T");
  
  // 4. Rendezzük a logot az idő szerint (soronként)
  // A log elemei: { z: zónaszám, h: óraszám, val: érték, type: "MAX"/"MIN", alertMsg: "..." }
  let sortedLog = [...alertLog].sort((a, b) => a.h - b.h);
  
  // 5. Táblázatos üzenet összeállítása (idő szerinti sorrendben)
  let subject = t.mailSubject + (unit === "C" ? "°C" : "°F") + todayStr;
  let body = t.mailBody + "\n\n";
  
  // A táblázat fejléce
  body += "Riasztások időrendben:\n";
  body += "----------------------\n";
  
  // Sorok (időpontok) hozzáadása
  for (let h = 0; h < hours; h++) {
    // Keresünk minden zónát, ahol ebben az órában hiba van
    let hourAlerts = sortedLog.filter(a => a.h === h);
    
    if (hourAlerts.length > 0) {
      // Ebben az órában van hiba, kiírjuk az összes zónát
      body += `Óra ${h}:00 - `;
      
      // Végigmegyünk a zónákon
      let zoneAlerts = [];
      for (let z = 1; z <= zones; z++) {
        let zoneSpecificAlert = hourAlerts.find(a => a.z === z);
        if (zoneSpecificAlert) {
          let type = zoneSpecificAlert.type === "MAX" ? "MAGAS" : "ALACSONY";
          let color = zoneSpecificAlert.type === "MAX" ? "🔴" : "🔵";
          body += `${color} Zóna ${z} (${zoneSpecificAlert.val}° ${type}) | `;
        }
      }
      body += "\n"; // Új sor az óra után
    }
  }
  
  // 6. Küldés
  let mailto = `mailto:${emails.join(",")}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
}
// --- ADATOK BETÖLTÉSE (A HIBÁS RÉSZ JAVÍTVA) ---
function loadData() {
  let savedData = localStorage.getItem(STORAGE_KEY);
  if (savedData) {
    let parsed = JSON.parse(savedData);
    todayData = parsed.todayData || {};
  }
  
  let savedThresholds = localStorage.getItem("thresholds");
  if (savedThresholds) thresholds = JSON.parse(savedThresholds);
  
  let savedEmails = localStorage.getItem(EMAILS_KEY);
  if (savedEmails) emails = JSON.parse(savedEmails);
  
  let savedAlertLog = localStorage.getItem(ALERT_LOG_KEY);
  if (savedAlertLog) alertLog = JSON.parse(savedAlertLog);
}

// Indítás
window.onload = init;
</script>
</body>
</html>
